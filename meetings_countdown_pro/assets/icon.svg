<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient — mid-tone blue -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b3b78"/>
      <stop offset="100%" stop-color="#2a2a60"/>
    </linearGradient>
    <!-- Clock face -->
    <linearGradient id="clockFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#32326a"/>
      <stop offset="100%" stop-color="#282858"/>
    </linearGradient>
    <!-- Red recording glow -->
    <radialGradient id="redGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
    <!-- Teal accent gradient -->
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Inner border -->
  <rect x="8" y="8" width="1008" height="1008" rx="222" ry="222"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Camera body -->
  <rect x="180" y="300" width="664" height="460" rx="48" ry="48"
        fill="none" stroke="#c0c0e0" stroke-width="8"/>

  <!-- Camera lens hood / top detail -->
  <rect x="360" y="248" width="160" height="64" rx="12" ry="12"
        fill="none" stroke="#c0c0e0" stroke-width="7"/>

  <!-- Recording indicator light -->
  <circle cx="776" cy="348" r="24" fill="url(#redGlow)"/>
  <circle cx="776" cy="348" r="13" fill="#ff6b6b"/>

  <!-- Clock face -->
  <circle cx="512" cy="530" r="190" fill="url(#clockFace)"
          stroke="#a5b4fc" stroke-width="9"/>

  <!-- Clock outer ring -->
  <circle cx="512" cy="530" r="208" fill="none"
          stroke="rgba(165,180,252,0.5)" stroke-width="4"/>

  <!-- Tick marks (12 positions) — bright white -->
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round">
    <!-- 12 --><line x1="512" y1="350" x2="512" y2="378"/>
    <!-- 1 --><line x1="602" y1="365" x2="593" y2="383"/>
    <!-- 2 --><line x1="677" y1="440" x2="659" y2="449"/>
    <!-- 3 --><line x1="692" y1="530" x2="664" y2="530"/>
    <!-- 4 --><line x1="677" y1="620" x2="659" y2="611"/>
    <!-- 5 --><line x1="602" y1="695" x2="593" y2="677"/>
    <!-- 6 --><line x1="512" y1="710" x2="512" y2="682"/>
    <!-- 7 --><line x1="422" y1="695" x2="431" y2="677"/>
    <!-- 8 --><line x1="347" y1="620" x2="365" y2="611"/>
    <!-- 9 --><line x1="332" y1="530" x2="360" y2="530"/>
    <!-- 10 --><line x1="347" y1="440" x2="365" y2="449"/>
    <!-- 11 --><line x1="422" y1="365" x2="431" y2="383"/>
  </g>

  <!-- Minute hand -->
  <line x1="512" y1="530" x2="448" y2="385"
        stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>

  <!-- Hour hand -->
  <line x1="512" y1="530" x2="590" y2="450"
        stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="512" cy="530" r="12" fill="#a5b4fc"/>

  <!-- Countdown arc (teal) -->
  <path d="M 512 340 A 190 190 0 1 1 385 688"
        fill="none" stroke="url(#tealGrad)" stroke-width="10"
        stroke-linecap="round"/>

  <!-- Broadcast waves (top-right) -->
  <g fill="none" stroke="#ff6b6b" stroke-width="7" stroke-linecap="round">
    <path d="M 780 220 A 60 60 0 0 1 820 280"/>
    <path d="M 795 195 A 100 100 0 0 1 855 295"/>
    <path d="M 810 170 A 140 140 0 0 1 890 310"/>
  </g>
</svg>
